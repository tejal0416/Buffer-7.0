id: rb_credential_abuse_v1
name: Credential Abuse (Brute Force / Credential Stuffing / ATO)
version: "1.0"
incident_types:
  - credential_abuse

defaults:
  owner_role: "SOC Analyst"
  severity_guidance: "High if auth_success after burst, privileged user, or critical app impacted."

steps:
  - id: scope_auth_activity
    title: "Scope the authentication activity"
    objective: "Understand which accounts, IPs, and apps are affected."
    procedure: |
      Review authentication failures and successes for user(s) {{ users_fmt }}.
      Identify source IPs {{ ips_fmt }} and targeted application(s) from raw fields.
    validation: "Confirm timestamps align and failures are not from scheduled jobs or misconfiguration."
    evidence:
      event_types: ["auth_failed", "auth_success", "siem_alert"]
      limit: 25

  - id: contain_account
    title: "Contain: protect accounts and reduce further attempts"
    objective: "Stop ongoing abuse with minimal disruption."
    procedure: |
      Apply step-up authentication or temporary lock for user(s) {{ users_fmt }}.
      Rate-limit or block suspicious IPs {{ ips_fmt }} at perimeter controls (if approved).
    rollback: "Remove temporary controls once confirmed benign or after investigation."
    evidence:
      event_types: ["auth_failed", "siem_alert"]
      limit: 25

  - id: reset_and_harden
    title: "Credential reset and hardening"
    objective: "Recover account security and prevent recurrence."
    procedure: |
      Force password reset for user(s) {{ users_fmt }}, invalidate tokens/sessions, and ensure MFA is enabled.
      If privileged, rotate related secrets and review recent privilege changes.
    evidence:
      event_types: ["auth_success"]
      limit: 10

  - id: hunt_follow_on
    title: "Hunt follow-on activity"
    objective: "Detect account takeover impact and lateral movement."
    procedure: |
      Review post-login activity for user(s) {{ users_fmt }} and host(s) {{ hosts_fmt }}.
      Look for unusual process execution {{ processes_fmt }}, new destinations, and data access spikes.
    evidence:
      event_types: ["process_start", "process_create", "dns_query", "http_request", "net_connection"]
      limit: 25

  - id: document_close
    title: "Document, tune detections, and close"
    objective: "Ensure learnings are captured and future noise is reduced."
    procedure: |
      Record evidence IDs, containment actions, and analyst conclusion.
      Add tuning notes (allowlists, thresholds) if this was benign.
    validation: "All claims in the case narrative cite evidence event IDs."

